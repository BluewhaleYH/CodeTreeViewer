# 패키징 설정. 상세/결정은 docs/DEPLOY.md.
appId: com.codetreeviewer.app
productName: CodeTreeViewer
directories:
  output: dist
  buildResources: resources
files:
  - out/**
# tree-sitter wasm은 런타임에 파일 경로로 로드하므로 asar 밖 리소스로 복사한다. (DEPLOY.md §5)
extraResources:
  - from: node_modules/web-tree-sitter/tree-sitter.wasm
    to: wasm/tree-sitter.wasm
  - from: node_modules/tree-sitter-wasms/out/tree-sitter-java.wasm
    to: wasm/tree-sitter-java.wasm
  - from: node_modules/tree-sitter-wasms/out/tree-sitter-kotlin.wasm
    to: wasm/tree-sitter-kotlin.wasm
  - from: node_modules/tree-sitter-wasms/out/tree-sitter-c.wasm
    to: wasm/tree-sitter-c.wasm
  - from: node_modules/tree-sitter-wasms/out/tree-sitter-cpp.wasm
    to: wasm/tree-sitter-cpp.wasm
# 자동 업데이트 피드: GitHub Releases. (DEPLOY.md §4)
publish:
  provider: github
  owner: BluewhaleYH
  repo: CodeTreeViewer
# 앱 아이콘(플레이스홀더). buildResources(resources)의 icon.png에서 플랫폼별 포맷 생성. (TODO_EXTRA A)
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: BluewhaleYH <bluewhaleyh@gmail.com>
  synopsis: 코드 파일/함수 관계 시각화 도구
  icon: resources/icon.png
win:
  target:
    - nsis
    - zip
  icon: resources/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
