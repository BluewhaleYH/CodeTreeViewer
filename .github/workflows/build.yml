name: build

# 패키징 산출물을 멀티 OS 러너에서 빌드한다. (DEPLOY.md §6)
# - main push / PR / 수동 실행: 빌드 검증만(퍼블리시·아티팩트 업로드 없음).
# - 태그(v*) push: GitHub Releases에 퍼블리시 + latest*.yml 생성(자동 업데이트 피드). (DEPLOY.md §4)
# 배포물은 태그 시 Releases로만 받는다(Actions 아티팩트 저장 쿼터 미사용).
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# 태그 퍼블리시 시 릴리즈 생성을 위해 필요.
permissions:
  contents: write

# Playwright는 _electron만 사용하므로 브라우저 다운로드를 생략한다(설치 시간/용량 절감).
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

jobs:
  e2e:
    name: E2E (Electron)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 헤드리스 러너에 가상 디스플레이(xvfb) 제공 + 개발 샌드박스 비활성. (TODO_EXTRA E)
      - run: xvfb-run --auto-servernum npm run test:e2e


  linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package (AppImage + deb)
        run: npx electron-builder --linux AppImage deb --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Windows (nsis + zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package (nsis + zip)
        run: npx electron-builder --win nsis zip --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
