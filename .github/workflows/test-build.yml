name: test-build

# 수동 실행 전용 테스트 빌드. (TODO_MORE)
# 정식 릴리스를 만들지 않고, Windows 설치본(.exe) + 포터블 zip을 빌드해
# 고정 태그 `test-build`의 **프리릴리스**로 발행한다.
# → 로그인 없이 공개 다운로드 가능, "latest" 아님(기존 설치본 자동 업데이트 영향 없음).
# workflow_dispatch 전용 → 자동 실행 없음.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: '빌드할 브랜치/커밋 (기본: main)'
        required: false
        default: 'main'

permissions:
  contents: write

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

jobs:
  windows-prerelease:
    name: Windows 테스트 프리릴리스
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 설치본(nsis .exe) + 포터블 zip 생성(퍼블리시는 gh로 직접 → --publish never).
      - name: Build Windows (nsis + zip)
        run: |
          npm run build
          npx electron-builder --win nsis zip --publish never
      # 산출물 파일명에 짧은 커밋 해시를 붙여 빌드마다 고유하게(캐시/구버전 혼동 방지). (TODO_MORE)
      - name: Rename artifacts with build id
        shell: bash
        run: |
          SHA=$(git rev-parse --short HEAD)
          cd dist
          for f in *-win.zip; do mv "$f" "CodeTreeViewer-${SHA}-win.zip"; done
          for f in *.exe; do mv "$f" "CodeTreeViewer-Setup-${SHA}.exe"; done
          ls -1 *.zip *.exe
      # 고정 태그 test-build 프리릴리스를 갱신(이전 것 삭제 후 재생성).
      - name: Publish test pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          SHA=$(git rev-parse --short HEAD)
          gh release delete test-build --yes --cleanup-tag || true
          gh release create test-build \
            --target "${{ inputs.ref }}" \
            --prerelease \
            --latest=false \
            --title "테스트 빌드 ($SHA)" \
            --notes "로그인 없이 받는 테스트용 프리릴리스. 정식 릴리스 아님. 빌드마다 이 게시물이 갱신되고 **파일명에 커밋 해시($SHA)**가 붙습니다(매번 새 파일).
          - 포터블(권장): \`CodeTreeViewer-$SHA-win.zip\` → **새 폴더에 풀고** CodeTreeViewer.exe 실행. 앱 **타이틀바에 \`· $SHA\`** 표시로 빌드 확인.
          - 설치본: \`CodeTreeViewer-Setup-$SHA.exe\`
          무서명이라 SmartScreen 경고 시 '추가 정보 → 실행'." \
            dist/*.exe dist/*-win.zip
          echo "릴리스 URL:"; gh release view test-build --json url --jq .url
